name: build immortalwrt mt7981

on:
  repository_dispatch:
  workflow_dispatch:
    inputs:
      SOURCE_BRANCH:
        description: '选择源码'
        required: true
        default: 'vipshmily-immortalwrt-mt798x-rebase'
        type: choice
        options:
          - 'vipshmily-immortalwrt-mt798x-rebase'
          - 'vipshmily-immortalwrt-mt798x-6.6'
          - 'vipshmily-immortalwrt-mt798x'
          - 'chasey-dev-immortalwrt-mt798x-rebase'
          - 'padavanonly-immortalwrt-mt798x-6.6'
          - 'padavanonly-immortalwrt-mt798x'
          - 'hanwckf-immortalwrt-mt798x'
          - 'immortalwrt'

      REPO_BRANCH:
        description: '选择分支'
        required: true
        default: 'main'
        type: choice
        options:
          - 'main'
          - 'main1'
          - 'main2'
          - 'master'
          - '25.12'
          - 'openwrt-21.02'
          - 'openwrt-24.10'
          - 'openwrt-24.10-6.6'
          - 'openwrt-25.12'

      DEVICE_MODEL:
        description: '选择型号'
        required: true
        default: 'nokia-ea0326gmp'
        type: choice
        options:
          - 'nokia-ea0326gmp'
          - 'cmcc-rax3000me'
          - 'multi-device'
          
      USE_NX30PRO_EEPROM:
        description: '使用 nx30pro 高功率eeprom'
        required: true
        default: true
        type: boolean
      
      SSH_ACTION:
        description: 'SSH 链接管理'
        required: false
        default: false
        type: boolean

  #schedule:
    #- cron:  '30 16 * * 5'

env:
  FEEDS_CONF: feeds.conf.default
  CONFIG_FILE: config/${{ inputs.SOURCE_BRANCH }}/${{ inputs.DEVICE_MODEL }}.config
  DTS_NAME: mt7981-${{ inputs.DEVICE_MODEL }}.dts
  DIY_P1_SH: config/${{ inputs.SOURCE_BRANCH }}/diy-part1.sh
  DIY_P2_SH: config/${{ inputs.SOURCE_BRANCH }}/diy-part2.sh
  DIY_P3_SH: config/${{ inputs.SOURCE_BRANCH }}/diy-part3.sh
  UPLOAD_BIN_DIR: false
  UPLOAD_FIRMWARE: true
  UPLOAD_RELEASE: true
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-24.04

    permissions:
      contents: write

    steps:
    - name: Checkout
      uses: actions/checkout@main

    - name: Initialization environment
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
        sudo -E apt-get -yqq update
        sudo -E apt-get -yqq install curl dos2unix python3-netifaces libfuse-dev
        sudo bash -c 'bash <(curl -sL https://build-scripts.immortalwrt.org/init_build_environment.sh)'
        sudo -E apt-get -yqq autoremove --purge
        sudo -E apt-get -yqq clean
        sudo timedatectl set-timezone "$TZ"
        sudo mkdir -p /workdir
        sudo chown $USER:$GROUPS /workdir

    - name: Free Disk Space (Ubuntu)
      uses: jlumbroso/free-disk-space@main
      with:
        # this might remove tools that are actually needed,
        # if set to "true" but frees about 6 GB
        tool-cache: true   
        # all of these default to true, but feel free to set to
        # "false" if necessary for your workflow
        android: true
        dotnet: true
        haskell: true
        large-packages: true
        docker-images: true
        swap-storage: true

    - name: Create virtual disk for extended storage
      run: |
        mnt_size=$(expr $(df -h /mnt | tail -1 | awk '{print $4}' | sed 's/[[:alpha:]]//g' | sed 's/\..*//') - 1)
        root_size=$(expr $(df -h / | tail -1 | awk '{print $4}' | sed 's/[[:alpha:]]//g' | sed 's/\..*//') - 4)
        sudo truncate -s "${mnt_size}"G /mnt/mnt.img
        sudo truncate -s "${root_size}"G /root.img
        sudo losetup /dev/loop6 /mnt/mnt.img
        sudo losetup /dev/loop7 /root.img
        sudo pvcreate /dev/loop6
        sudo pvcreate /dev/loop7
        sudo vgcreate github /dev/loop6 /dev/loop7
        sudo lvcreate -n runner -l 100%FREE github
        sudo mkfs.xfs -f -i sparse=0 -b size=4096 /dev/github/runner
        sudo mkdir -p /builder
        sudo mount /dev/github/runner /builder
        sudo chown -R runner:runner /builder
        df -Th
        echo "status=success" >> ${GITHUB_OUTPUT}

    - name: Clone source code [ ${{ inputs.SOURCE_BRANCH }}-${{ inputs.REPO_BRANCH }}-${{ inputs.DEVICE_MODEL }} ]
      working-directory: /workdir
      run: |
        if [ "${{ inputs.SOURCE_BRANCH }}" = "vipshmily-immortalwrt-mt798x" ]; then
            REPO_URL="https://github.com/vipshmily/immortalwrt-mt798x"
            REPO_BRANCH="${{ inputs.REPO_BRANCH }}"
        elif [ "${{ inputs.SOURCE_BRANCH }}" = "vipshmily-immortalwrt-mt798x-6.6" ]; then
              REPO_URL="https://github.com/vipshmily/immortalwrt-mt798x-6.6"
              REPO_BRANCH="${{ inputs.REPO_BRANCH }}"
        elif [ "${{ inputs.SOURCE_BRANCH }}" = "vipshmily-immortalwrt-mt798x-rebase" ]; then
              REPO_URL="https://github.com/vipshmily/immortalwrt-mt798x-rebase"
              REPO_BRANCH="${{ inputs.REPO_BRANCH }}"
        elif [ "${{ inputs.SOURCE_BRANCH }}" = "padavanonly-immortalwrt-mt798x" ]; then
              REPO_URL="https://github.com/padavanonly/immortalwrt-mt798x"
              REPO_BRANCH="${{ inputs.REPO_BRANCH }}"
        elif [ "${{ inputs.SOURCE_BRANCH }}" = "padavanonly-immortalwrt-mt798x-6.6" ]; then
              REPO_URL="https://github.com/padavanonly/immortalwrt-mt798x-6.6"
              REPO_BRANCH="${{ inputs.REPO_BRANCH }}"
        elif [ "${{ inputs.SOURCE_BRANCH }}" = "chasey-dev-immortalwrt-mt798x-rebase" ]; then
              REPO_URL="https://github.com/chasey-dev/immortalwrt-mt798x-rebase"
              REPO_BRANCH="${{ inputs.REPO_BRANCH }}"
        elif [ "${{ inputs.SOURCE_BRANCH }}" = "hanwckf-immortalwrt-mt798x" ]; then
              REPO_URL="https://github.com/hanwckf/immortalwrt-mt798x"
              REPO_BRANCH="${{ inputs.REPO_BRANCH }}"
        elif [ "${{ inputs.SOURCE_BRANCH }}" = "immortalwrt" ]; then
              REPO_URL="https://github.com/immortalwrt/immortalwrt"
              REPO_BRANCH="${{ inputs.REPO_BRANCH }}"
        else
              echo "Unknown source code repository."
              exit 1
        fi
        df -hT $PWD
        git clone $REPO_URL -b $REPO_BRANCH openwrt
        ln -sf /workdir/openwrt $GITHUB_WORKSPACE/openwrt

    - name: Cache
      uses: klever1988/cachewrtbuild@main
      with:
        ccache: 'true'
        mixkey: '${{ inputs.DEVICE_MODEL }}'
        prefix: '${{ github.workspace }}/openwrt'

    - name: Load custom feeds
      run: |
        [ -e $FEEDS_CONF ] && mv $FEEDS_CONF openwrt/feeds.conf.default
        chmod +x $DIY_P1_SH
        cd openwrt
        $GITHUB_WORKSPACE/$DIY_P1_SH

    - name: Update and install feeds
      run: |
        cd openwrt
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: Load custom configuration
      run: |
        [ -e files ] && mv files openwrt/files
        [ -e $CONFIG_FILE ] && mv $CONFIG_FILE openwrt/.config
        chmod +x $DIY_P2_SH
        cd openwrt
        $GITHUB_WORKSPACE/$DIY_P2_SH

    #- name: Load custom package
    #  run: |
    #    chmod +x $DIY_P3_SH
    #    cd openwrt/package
    #    $GITHUB_WORKSPACE/$DIY_P3_SH

    - name: 设置 nx30pro 高功率eeprom
      if: github.event.inputs.USE_NX30PRO_EEPROM == 'true'
      run: |
        #mkdir openwrt/target/linux/mediatek/filogic/base-files/lib/firmware
        #cp config/${{ inputs.SOURCE_BRANCH }}/eeprom/nx30pro_eeprom.bin openwrt/target/linux/mediatek/filogic/base-files/lib/firmware/MT7981_iPAiLNA_EEPROM.bin
        #sed -i 's/caldata_extract_mmc/# caldata_extract_mmc/' openwrt/target/linux/mediatek/filogic/base-files/lib/preinit/90_extract_caldata
        #sed -i 's#./files/mt7981-default-eeprom/MT7981_iPAiLNA_EEPROM.bin##' openwrt/package/mtk/drivers/mt_wifi/Makefile
        cd openwrt
        cp $GITHUB_WORKSPACE/config/${{ inputs.SOURCE_BRANCH }}/mt79xx_20231229-4012a0_eeprom.tar.xz dl/mt79xx_20231229-4012a0.tar.xz
        cp $GITHUB_WORKSPACE/config/${{ inputs.SOURCE_BRANCH }}/mt79xx_20250408-705eb4_eeprom.tar.xz dl/mt79xx_20250408-705eb4.tar.xz

    - name: SSH connection to Actions
      uses: vipshmily/ssh2actions@main
      if: (github.event.inputs.SSH_ACTION == 'true' && github.event.inputs.SSH_ACTION  != 'false') || contains(github.event.action, 'ssh')
      env:
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          
    - name: Download package
      id: package
      run: |
        cd openwrt
        make defconfig
        make download -j8
        find dl -size -1024c -exec ls -l {} \;
        find dl -size -1024c -exec rm -f {} \;

    - name: Compile the firmware
      id: compile
      run: |
        cd openwrt
        echo -e "$(($(nproc)+4)) thread compile"
        make -j$(($(nproc)+4)) || make -j$(nproc) V=s
        echo "${{ inputs.DEVICE_MODEL }}" > DEVICE_NAME
        #grep '^CONFIG_TARGET.*DEVICE.*=y' .config | sed -r 's/.*DEVICE_(.*)=y/\1/' > DEVICE_NAME
        [ -s DEVICE_NAME ] && echo "DEVICE_NAME=$(cat DEVICE_NAME)" >> $GITHUB_ENV
        if [ ${{ github.event.inputs.USE_NX30PRO_EEPROM }} == 'true' ]; then
                echo "EEPROM=-eeprom" >> $GITHUB_ENV
        else
                echo "EEPROM=" >> $GITHUB_ENV
        fi
        echo "FILE_DATE=$(date +"%Y.%m.%d-%H%M")" >> $GITHUB_ENV
        echo "COMPILE_TIME=$(date +"%Y-%m-%d %H:%M:%S")" >> $GITHUB_ENV
        echo "status=success" >> $GITHUB_OUTPUT

    - name: Check space usage
      if: (!cancelled())
      run: df -hT

    - name: Upload bin directory
      uses: actions/upload-artifact@main
      if: steps.compile.outputs.status == 'success' && env.UPLOAD_BIN_DIR == 'true'
      with:
        name: ${{ env.DEVICE_NAME }}_bin_${{ env.FILE_DATE }}
        path: openwrt/bin

    - name: Organize files
      id: organize
      if: env.UPLOAD_FIRMWARE == 'true' && !cancelled()
      run: |
        cd openwrt/bin/targets/*/*
        rm -rf packages
        echo "FIRMWARE=$PWD" >> $GITHUB_ENV
        echo "status=success" >> $GITHUB_OUTPUT

    - name: Upload firmware directory
      uses: actions/upload-artifact@main
      if: steps.organize.outputs.status == 'success' && !cancelled()
      with:
        name: ${{ env.DEVICE_NAME }}_${{ env.FILE_DATE }}
        path: ${{ env.FIRMWARE }}

    - name: Generate release tag
      id: tag
      if: env.UPLOAD_RELEASE == 'true' && !cancelled()
      run: |
        touch release.txt
        echo "- 使用源码：${{ inputs.SOURCE_BRANCH }}" >> release.txt
        echo "- 使用分支：${{ inputs.REPO_BRANCH }}" >> release.txt
        echo "- 登录地址：192.168.6.1" >> release.txt
        echo "- 用户名：root" >> release.txt
        echo "- 密码：空" >> release.txt
        if [[ "${{ env.EEPROM }}" == '-eeprom' ]]; then
               echo "- 使用nx30pro高功率eeprom" >> release.txt
        else
               echo "- 未使用nx30pro高功率eeprom" >> release.txt
        fi
        echo "status=success" >> $GITHUB_OUTPUT

    - name: Upload firmware to release
      uses: softprops/action-gh-release@master
      if: steps.tag.outputs.status == 'success' && !cancelled()
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        files: ${{ env.FIRMWARE }}/*
        name: ${{ env.DEVICE_NAME }}_${{ env.FILE_DATE }}
        tag_name: v${{ env.FILE_DATE }}
        body_path: release.txt

    - name: Delete old releases and workflows
      uses: ophub/delete-releases-workflows@main
      with:
        gh_token: ${{secrets.GITHUB_TOKEN}}
        delete_releases: true
        releases_keep_latest: 10
        delete_tags: true
        delete_workflows: true
        workflows_keep_day: 30